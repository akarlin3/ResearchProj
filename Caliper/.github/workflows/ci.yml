name: CI

on:
  push:
    branches: ["**"]
    paths: ["Caliper/**"]
  pull_request:
    paths: ["Caliper/**"]

defaults:
  run:
    working-directory: Caliper

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest, numpy-only core)
        run: pytest -q
